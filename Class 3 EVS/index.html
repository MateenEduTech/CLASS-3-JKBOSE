<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0f0c29">
<title>Class 3 EVS Learning App</title>
<link rel="manifest" href="manifest.json">
<style>
/* ── CSS RESET & VARIABLES ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0c29;--bg2:#302b63;--bg3:#24243e;
  --primary:#FF6B35;--secondary:#4ECDC4;--accent:#FFE66D;
  --green:#22C55E;--blue:#3B82F6;--purple:#A855F7;
  --text:#fff;--text2:#CBD5E1;--card:#ffffff18;
  --r:16px;--rr:24px;
  font-size:16px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Tahoma,sans-serif;min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh;animation:fadeIn .4s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes bgPulse{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 18px #FFE66D88}50%{box-shadow:0 0 36px #FFE66Dcc,0 0 60px #FF6B3566}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes popIn{0%{transform:scale(0.5);opacity:0}80%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
/* ── TITLE SCREEN ── */
#title{
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e,#FF6B3522,#4ECDC422);
  background-size:400% 400%;animation:bgPulse 8s ease infinite;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;text-align:center;padding:20px;position:relative;overflow:hidden;
}
.title-scene{font-size:2.5rem;animation:float 3s ease-in-out infinite;margin-bottom:8px}
.title-h1{font-size:clamp(1.6rem,5vw,2.6rem);font-weight:900;
  background:linear-gradient(90deg,#FF6B35,#FFE66D,#4ECDC4,#FF6B35);
  background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:shimmer 3s linear infinite;margin-bottom:16px}
.author-photo{
  width:130px;height:130px;border-radius:50%;object-fit:cover;
  border:4px solid #FFE66D;animation:glowPulse 2.5s ease-in-out infinite;
  margin:12px auto;display:block;box-shadow:0 8px 32px #00000060
}
.author-name{font-size:1.25rem;font-weight:800;color:#FFE66D;margin-top:8px}
.author-title{font-size:.85rem;color:#CBD5E1;margin-top:4px;line-height:1.5}
.start-btn{
  margin-top:22px;padding:16px 48px;font-size:1.2rem;font-weight:800;
  background:linear-gradient(135deg,#FF6B35,#FFE66D);color:#1a1a2e;
  border:none;border-radius:50px;cursor:pointer;animation:bounce 2s ease-in-out infinite;
  box-shadow:0 8px 24px #FF6B3566;letter-spacing:1px;
}
.floating-item{position:absolute;font-size:1.6rem;animation:float 3s ease-in-out infinite;pointer-events:none}
/* ── BOTTOM NAV ── */
.bnav{
  position:fixed;bottom:0;left:0;right:0;
  background:#1a1a3eee;backdrop-filter:blur(12px);
  display:flex;justify-content:space-around;padding:8px 0;
  border-top:1px solid #ffffff22;z-index:100
}
.bnav-btn{background:none;border:none;color:#94A3B8;font-size:.65rem;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 10px;
  border-radius:10px;transition:.2s}
.bnav-btn span{font-size:1.3rem}
.bnav-btn.active,.bnav-btn:hover{color:var(--accent);background:#ffffff11}
/* ── HOME SCREEN ── */
#home{background:linear-gradient(160deg,var(--bg),var(--bg2));min-height:100vh;padding:20px 16px 90px}
.home-header{
  background:linear-gradient(135deg,#FF6B3522,#4ECDC422);
  border:1px solid #ffffff22;border-radius:var(--rr);padding:20px;margin-bottom:20px;
  text-align:center
}
.home-header h2{font-size:1.4rem;font-weight:800;color:var(--accent)}
.stars-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.total-stars{font-size:1rem;color:#FFE66D;font-weight:700}
.progress-bar-wrap{background:#ffffff22;border-radius:20px;height:8px;margin-top:8px}
.progress-bar-fill{height:8px;border-radius:20px;background:linear-gradient(90deg,#FF6B35,#FFE66D);transition:.5s}
.chapter-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ch-card{
  background:var(--card);border:1px solid #ffffff22;border-radius:var(--r);
  padding:16px 12px;cursor:pointer;transition:.25s;position:relative;overflow:hidden;
  text-align:center;
}
.ch-card::before{content:'';position:absolute;inset:0;background:var(--ch-color);opacity:.08;border-radius:var(--r)}
.ch-card:hover,.ch-card:active{transform:scale(1.03);border-color:var(--ch-color)}
.ch-emoji{font-size:2.2rem;display:block;margin-bottom:6px}
.ch-title{font-size:.82rem;font-weight:700;color:#E2E8F0;line-height:1.3}
.ch-stars{color:#FFE66D;font-size:.75rem;margin-top:4px}
.ch-done{position:absolute;top:8px;right:8px;font-size:.8rem}
/* ── CHAPTER SCREEN ── */
#chapter{background:linear-gradient(160deg,var(--bg),var(--bg2));min-height:100vh;padding:0 0 90px}
.ch-header{padding:20px 16px 0;display:flex;align-items:center;gap:12px}
.back-btn{background:var(--card);border:none;color:#fff;width:40px;height:40px;
  border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ch-header-info h2{font-size:1.2rem;font-weight:800}
.ch-header-info p{font-size:.8rem;color:var(--text2)}
/* tabs */
.tabs{display:flex;gap:6px;overflow-x:auto;padding:14px 16px 0;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:var(--card);border:none;color:#94A3B8;padding:8px 14px;border-radius:20px;
  font-size:.78rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:.2s;flex-shrink:0}
.tab.active{background:var(--primary);color:#fff}
.tab-content{display:none;padding:16px}
.tab-content.active{display:block;animation:fadeIn .3s ease}
/* story / learn */
.story-box{background:var(--card);border:1px solid #ffffff22;border-radius:var(--r);padding:18px;
  font-size:.95rem;line-height:1.7;color:#E2E8F0}
.story-box::before{content:'"';font-size:3rem;color:var(--primary);line-height:1;display:block;margin-bottom:-10px}
.concept-list{list-style:none;display:flex;flex-direction:column;gap:10px}
.concept-list li{background:var(--card);border-left:4px solid var(--primary);
  border-radius:8px;padding:12px 14px;font-size:.9rem;line-height:1.5;color:#E2E8F0}
.concept-list li::before{content:attr(data-n);font-weight:800;color:var(--accent);margin-right:8px}
/* svg visual */
.visual-wrap{border-radius:var(--r);overflow:hidden;border:1px solid #ffffff22}
.visual-wrap svg{width:100%;height:auto;display:block}
/* flashcards */
.fc-container{perspective:800px}
.fc{background:linear-gradient(135deg,var(--card),#ffffff10);border:1px solid #ffffff22;
  border-radius:var(--r);padding:20px;text-align:center;min-height:120px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:.3s;margin-bottom:12px;position:relative}
.fc .fc-q{font-size:1rem;font-weight:700;color:#E2E8F0;transition:.3s}
.fc .fc-a{font-size:.9rem;color:var(--secondary);display:none;font-style:italic}
.fc.flipped .fc-q{display:none}
.fc.flipped .fc-a{display:block}
.fc-badge{position:absolute;top:8px;right:12px;font-size:.7rem;color:#94A3B8}
.fc-nav{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.fc-nav button{background:var(--primary);border:none;color:#fff;padding:8px 20px;
  border-radius:20px;cursor:pointer;font-weight:700}
.fc-counter{color:var(--accent);font-weight:700}
/* quiz */
.quiz-q{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:12px;
  font-size:1rem;font-weight:700;color:#E2E8F0}
.quiz-opts{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.quiz-opt{background:#ffffff11;border:1.5px solid #ffffff22;border-radius:10px;
  padding:12px 14px;cursor:pointer;font-size:.9rem;color:#E2E8F0;transition:.2s;text-align:left}
.quiz-opt:hover{border-color:var(--primary);background:#ffffff1a}
.quiz-opt.correct{background:#22C55E33;border-color:#22C55E;color:#4ADE80}
.quiz-opt.wrong{background:#EF444433;border-color:#EF4444;color:#FCA5A5}
.quiz-result{text-align:center;padding:24px 16px;animation:popIn .5s ease}
.quiz-result .score{font-size:2.5rem;font-weight:900;color:var(--accent)}
.quiz-result p{color:var(--text2);margin-top:6px}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));color:#1a1a2e;
  border:none;border-radius:50px;padding:12px 32px;font-size:1rem;font-weight:800;cursor:pointer;margin-top:14px}
/* reflect */
.reflect-box{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:12px}
.reflect-box h4{color:var(--accent);margin-bottom:8px;font-size:.9rem}
.reflect-box p{color:#CBD5E1;font-size:.9rem;line-height:1.6}
/* activity/game */
.game-wrap{background:var(--card);border:1px solid #ffffff22;border-radius:var(--r);overflow:hidden}
/* progress screen */
#progress{background:linear-gradient(160deg,var(--bg),var(--bg2));min-height:100vh;padding:20px 16px 90px}
.prog-header{text-align:center;margin-bottom:20px}
.prog-header h2{font-size:1.5rem;font-weight:800;color:var(--accent)}
.badges-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.badge{background:var(--card);border:1px solid #ffffff22;border-radius:var(--r);
  padding:14px;text-align:center;opacity:.4;transition:.3s}
.badge.earned{opacity:1;border-color:var(--accent);box-shadow:0 0 16px #FFE66D44}
.badge-icon{font-size:2rem;display:block;margin-bottom:4px}
.badge-name{font-size:.7rem;color:var(--text2)}
.ch-prog-list{display:flex;flex-direction:column;gap:8px}
.ch-prog-item{background:var(--card);border-radius:10px;padding:12px;display:flex;align-items:center;gap:10px}
.ch-prog-emoji{font-size:1.4rem}
.ch-prog-info{flex:1}
.ch-prog-title{font-size:.85rem;font-weight:700}
.ch-prog-stars{font-size:.75rem;color:#FFE66D}
.reset-btn{display:block;width:100%;margin-top:20px;background:#EF444433;border:1.5px solid #EF4444;
  color:#FCA5A5;padding:12px;border-radius:10px;cursor:pointer;font-size:.9rem;font-weight:700}
/* bookmarks */
#bookmarks{background:linear-gradient(160deg,var(--bg),var(--bg2));min-height:100vh;padding:20px 16px 90px}
#bookmarks h2{font-size:1.4rem;font-weight:800;color:var(--accent);margin-bottom:16px}
.bm-item{background:var(--card);border:1px solid #ffffff22;border-radius:var(--r);
  padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer}
.bm-item:hover{border-color:var(--primary)}
.bm-emoji{font-size:1.8rem}
.bm-info h4{font-size:.9rem;font-weight:700}
.bm-info p{font-size:.75rem;color:var(--text2)}
.bm-remove{background:none;border:none;color:#EF4444;cursor:pointer;font-size:1rem;margin-left:auto}
.empty-state{text-align:center;color:var(--text2);padding:40px 20px;font-size:1rem}
/* celebrate overlay */
#celebrate{position:fixed;inset:0;background:#000000cc;z-index:999;display:none;
  align-items:center;justify-content:center;flex-direction:column;text-align:center}
#celebrate.show{display:flex}
.cel-msg{font-size:1.8rem;font-weight:900;color:var(--accent);animation:popIn .5s ease}
.cel-stars{font-size:2.5rem;margin:10px 0}
.cel-close{background:linear-gradient(135deg,var(--primary),var(--accent));color:#1a1a2e;
  border:none;border-radius:50px;padding:12px 32px;font-size:1rem;font-weight:800;cursor:pointer;margin-top:12px}
/* confetti */
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;
  animation:confettiFall 2.5s ease forwards;z-index:1000;pointer-events:none}
/* scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#ffffff33;border-radius:4px}
/* responsive */
@media(max-width:360px){.chapter-grid{grid-template-columns:1fr}.tabs{gap:4px}.tab{padding:6px 10px}}
</style>
</head>

 is the role of grandparents?", "a": "They share wisdom, tell stories, and guide the family."}], "quiz": [{"q": "Who is the head of a joint family?", "opts": ["Grandparents", "Pet dog", "Neighbour", "Teacher"], "ans": 0}, {"q": "A family with only parents and children is called a:", "opts": ["Joint family", "Nuclear family", "School family", "Village family"], "ans": 1}, {"q": "Which feeling is most important in a family?", "opts": ["Anger", "Jealousy", "Love", "Fear"], "ans": 2}, {"q": "How should we treat our elders?", "opts": ["Ignore them", "Argue always", "Respect them", "Play pranks"], "ans": 2}, {"q": "Who cooks food at home in many families?", "opts": ["Postman", "Mother/Father", "Doctor", "Shopkeeper"], "ans": 1}], "reflect": ["Draw your family and write one word that describes each member.", "Ask your grandparent to share a story from their childhood tonight."], "game": "family-match"}, {"id": 1, "emoji": "🏫", "title": "My School", "color": "#4ECDC4", "story": "Arjun loves coming to school every day. His teacher Ms Noor draws colourful pictures on the board, the library smells of books, and the playground rings with laughter. School is where Arjun learns to read, count stars, make friends, and become the best version of himself.", "concepts": ["A school is a place where children learn, grow, and make friends.", "Schools have classrooms, libraries, playgrounds, and labs.", "Teachers guide us like second parents.", "We follow rules like raising hands and keeping the school clean.", "Education helps us build a better future."], "svg": "<svg viewBox='0 0 300 200' xmlns='http://www.w3.org/2000/svg'>\n      <rect width='300' height='200' fill='#E8FDF5'/>\n      <rect x='60' y='90' width='180' height='100' fill='#4ECDC4' rx='4'/>\n      <polygon points='40,90 150,30 260,90' fill='#FF6B35'/>\n      <rect x='130' y='140' width='40' height='50' fill='#8B5E3C' rx='3'/>\n      <rect x='70' y='100' width='35' height='35' fill='#FFF' rx='2'/>\n      <rect x='195' y='100' width='35' height='35' fill='#FFF' rx='2'/>\n      <rect x='140' y='50' width='20' height='30' fill='#FFD166'/>\n      <circle cx='150' cy='45' r='10' fill='#EF476F'/>\n      <text x='150' y='195' text-anchor='middle' font-size='11' fill='#555'>My School 📚</text>\n    </svg>", "flashcards": [{"q": "What is a school?", "a": "A place where children learn, play, and grow together."}, {"q": "Name three rooms found in a school.", "a": "Classroom, library, and laboratory."}, {"q": "Why do we follow school rules?", "a": "To keep order, respect others, and learn well."}, {"q": "What is the role of a teacher?", "a": "To teach, guide, and help students learn new things."}, {"q": "Why is the library important?", "a": "It has books that help us gain knowledge and imagination."}], "quiz": [{"q": "Where do we study and learn?", "opts": ["Hospital", "Market", "School", "Farm"], "ans": 2}, {"q": "Who teaches us in school?", "opts": ["Doctor", "Teacher", "Farmer", "Driver"], "ans": 1}, {"q": "What do we find in a library?", "opts": ["Food", "Books", "Clothes", "Cars"], "ans": 1}, {"q": "Why should we keep our school clean?", "opts": ["For decoration", "For health and hygiene", "To win a prize", "To paint it"], "ans": 1}, {"q": "Which of these is a school rule?", "opts": ["Run in corridors", "Raise hand before speaking", "Throw litter", "Skip class"], "ans": 1}], "reflect": ["What is your favourite part of school and why?", "How can you help keep your school beautiful today?"], "game": "school-quiz-fast"}, {"id": 2, "emoji": "🏘️", "title": "My Neighbourhood", "color": "#A855F7", "story": "Sara steps out of her house and waves at the dhobi, the baker, the doctor, and the gardener. Each neighbour has a special job that helps everyone else. The vegetable seller brings fresh tomatoes, the postman delivers letters, and the watchman keeps everyone safe at night. A neighbourhood is like one big family!", "concepts": ["A neighbourhood is the area around our home where people live and work.", "Community helpers like doctors, police, and teachers serve everyone.", "We must respect our neighbours and their property.", "Keeping the neighbourhood clean benefits everyone.", "Markets, parks, hospitals, and temples are public places we share."], "svg": "<svg viewBox='0 0 300 200' xmlns='http://www.w3.org/2000/svg'>\n      <rect width='300' height='200' fill='#F5F0FF'/>\n      <rect x='20' y='110' width='60' height='80' fill='#A855F7' rx='4'/>\n      <polygon points='10,110 50,75 90,110' fill='#7C3AED'/>\n      <rect x='120' y='120' width='60' height='70' fill='#EC4899' rx='4'/>\n      <polygon points='110,120 150,85 190,120' fill='#BE185D'/>\n      <rect x='220' y='105' width='70' height='85' fill='#F97316' rx='4'/>\n      <polygon points='210,105 255,65 300,105' fill='#EA580C'/>\n      <rect x='0' y='185' width='300' height='15' fill='#6B7280'/>\n      <circle cx='50' cy='140' r='4' fill='#FFD166'/>\n      <circle cx='150' cy='150' r='4' fill='#FFD166'/>\n      <text x='150' y='198' text-anchor='middle' font-size='10' fill='#FFF'>Our Neighbourhood 🏘️</text>\n    </svg>", "flashcards": [{"q": "What is a neighbourhood?", "a": "The area around our home where people live and work together."}, {"q": "Name three community helpers.", "a": "Doctor, police officer, and teacher."}, {"q": "How should we treat our neighbours?", "a": "With respect, kindness, and helpfulness."}, {"q": "Why should we keep streets clean?", "a": "For health, beauty, and safety of everyone."}, {"q": "What is a public place?", "a": "A place used and shared by everyone, like a park or hospital."}], "quiz": [{"q": "Who helps us when we are sick?", "opts": ["Baker", "Doctor", "Postman", "Farmer"], "ans": 1}, {"q": "Who delivers letters to our homes?", "opts": ["Postman", "Teacher", "Police", "Carpenter"], "ans": 0}, {"q": "A park is a __ place.", "opts": ["Private", "Secret", "Public", "Locked"], "ans": 2}, {"q": "What should we NOT do in our neighbourhood?", "opts": ["Help neighbours", "Throw garbage", "Plant trees", "Greet elders"], "ans": 1}, {"q": "Who protects us and keeps law and order?", "opts": ["Baker", "Actor", "Police officer", "Painter"], "ans": 2}], "reflect": ["List five community helpers in your neighbourhood and their jobs.", "How can you help keep your street clean this week?"], "game": "helper-match"}, {"id": 3, "emoji": "🌱", "title": "Plants Around Us", "color": "#22C55E", "story": "Meera planted a tiny seed in a pot. She watered it every morning and placed it in sunlight. Day by day a shoot appeared, then leaves, then a flower! She realised plants are alive just like us — they breathe, grow, and need food, water, and air. Without plants, no animal or human could survive.", "concepts": ["Plants make their own food using sunlight, water, and carbon dioxide — called photosynthesis.", "All plants have roots, stem, leaves, and most have flowers and fruits.", "Plants give us oxygen, food, wood, medicine, and shade.", "Plants can be trees, shrubs, herbs, climbers, or creepers.", "We must protect plants by not cutting them unnecessarily."], "svg": "<svg viewBox='0 0 300 200' xmlns='http://www.w3.org/2000/svg'>\n      <rect width='300' height='200' fill='#F0FFF4'/>\n      <rect x='0' y='160' width='300' height='40' fill='#92400E' rx='2'/>\n      <line x1='150' y1='160' x2='150' y2='60' stroke='#16A34A' stroke-width='6'/>\n      <ellipse cx='100' cy='100' rx='40' ry='22' fill='#4ADE80' transform='rotate(-30,100,100)'/>\n      <ellipse cx='200' cy='90' rx='40' ry='22' fill='#4ADE80' transform='rotate(30,200,90)'/>\n      <ellipse cx='150' cy='65' rx='35' ry='20' fill='#22C55E'/>\n      <circle cx='150' cy='50' r='18' fill='#FBBF24'/>\n      <circle cx='150' cy='50' r='10' fill='#F59E0B'/>\n      <text x='60' y='155' font-size='11' fill='#16A34A'>🌞 Sun gives energy</text>\n      <line x1='130' y1='175' x2='110' y2='185' stroke='#92400E' stroke-width='3'/>\n      <line x1='150' y1='175' x2='150' y2='190' stroke='#92400E' stroke-width='3'/>\n      <line x1='170' y1='175' x2='190' y2='185' stroke='#92400E' stroke-width='3'/>\n      <text x='150' y='198' text-anchor='middle' font-size='10' fill='#555'>Parts of a Plant 🌱</text>\n    </svg>", "flashcards": [{"q": "What do plants need to make food?", "a": "Sunlight, water, and carbon dioxide."}, {"q": "What is photosynthesis?", "a": "The process by which plants make their own food using sunlight."}, {"q": "Name the main parts of a plant.", "a": "Roots, stem, leaves, flower, and fruit."}, {"q": "Name two things we get from plants.", "a": "Oxygen and food (fruits, vegetables, grains)."}, {"q": "What type of plant is a rose?", "a": "A shrub — it has a woody stem but is smaller than a tree."}], "quiz": [{"q": "Which part of a plant absorbs water from soil?", "opts": ["Flower", "Fruit", "Leaf", "Root"], "ans": 3}, {"q": "Plants make food through a process called:", "opts": ["Digestion", "Photosynthesis", "Respiration", "Germination"], "ans": 1}, {"q": "Which gas do plants release during the day?", "opts": ["Carbon dioxide", "Nitrogen", "Oxygen", "Smoke"], "ans": 2}, {"q": "A mango tree is an example of a:", "opts": ["Herb", "Creeper", "Climber", "Tree"], "ans": 3}, {"q": "Which of these is NOT a part of a plant?", "opts": ["Root", "Stem", "Leaf", "Wheel"], "ans": 3}], "reflect": ["Plant a seed in a small pot. Observe and draw its growth every day for a week.", "Why would life on Earth be impossible without plants?"], "game": "plant-growth"}, {"id": 4, "emoji": "🐾", "title": "Animals Around Us", "color": "#F97316", "story": "On a school trip to a nature reserve, Kabir saw a deer, a peacock, and a mongoose. Their teacher explained that every animal has a habitat — its natural home. Fish live in water, eagles soar in the sky, and lions roam grasslands. Animals give us food, clothing, and companionship, and we must protect them.", "concepts": ["Animals can be wild (lion, elephant) or domestic (cow, dog).", "Animals live in different habitats: land, water, sky, and underground.", "They can be herbivores (plant-eaters), carnivores (meat-eaters), or omnivores (both).", "Animals give us milk, wool, eggs, honey, and help in farming.", "We must not harm animals; they are part of our ecosystem."], "svg": "<svg viewBox='0 0 300 200' xmlns='http://www.w3.org/2000/svg'>\n      <rect width='300' height='200' fill='#FFF7ED'/>\n      <rect x='0' y='140' width='300' height='60' fill='#86EFAC' rx='2'/>\n      <rect x='0' y='0' width='300' height='60' fill='#BAE6FD'/>\n      <ellipse cx='60' cy='155' rx='28' ry='15' fill='#F97316'/>\n      <circle cx='60' cy='138' r='14' fill='#F97316'/>\n      <circle cx='55' cy='134' r='3' fill='#FFF'/>\n      <circle cx='65' cy='134' r='3' fill='#FFF'/>\n      <ellipse cx='150' cy='30' rx='20' ry='12' fill='#60A5FA'/>\n      <polygon points='138,30 150,18 162,30' fill='#3B82F6'/>\n      <ellipse cx='240' cy='150' rx='30' ry='14' fill='#4ADE80'/>\n      <circle cx='240' cy='135' r='16' fill='#22C55E'/>\n      <text x='60' y='190' text-anchor='middle' font-size='9' fill='#555'>Land</text>\n      <text x='150' y='190' text-anchor='middle' font-size='9' fill='#555'>Sky</text>\n      <text x='240' y='190' text-anchor='middle' font-size='9' fill='#555'>Water</text>\n      <text x='150' y='198' text-anchor='middle' font-size='10' fill='#555'>Animal Habitats 🐾</text>\n    </svg>", "flashcards": [{"q": "What is a habitat?", "a": "The natural home where an animal lives and finds food."}, {"q": "Name two domestic animals.", "a": "Cow and dog (also: horse, sheep, cat, etc.)."}, {"q": "What do herbivores eat?", "a": "Only plants — grass, leaves, fruits, and vegetables."}, {"q": "Name two things we get from animals.", "a": "Milk (from cows) and wool (from sheep)."}, {"q": "Name a water animal and a land animal.", "a": "Fish (water) and elephant (land)."}], "quiz": [{"q": "Which animal gives us milk?", "opts": ["Dog", "Tiger", "Cow", "Eagle"], "ans": 2}, {"q": "A lion is a:", "opts": ["Domestic animal", "Wild animal", "Water animal", "Pet"], "ans": 1}, {"q": "Which animal is a herbivore?", "opts": ["Tiger", "Cow", "Fox", "Cat"], "ans": 1}, {"q": "Where does a fish live?", "opts": ["Desert", "Forest", "Water", "Sky"], "ans": 2}, {"q": "Which of these is an omnivore?", "opts": ["Deer", "Cow", "Bear", "Horse"], "ans": 2}], "reflect": ["Visit a local farm or park and list five animals you see and their food habits.", "Why is it important to protect wild animals from extinction?"], "game": "habitat-explorer"}, {"id": 5, "emoji": "💧", "title": "Water", "color": "#3B82F6", "story": "One hot summer the river in Priya's village dried up. People had to walk far to fetch water. Priya's grandfather explained the water cycle — how rain falls, rivers flow, water evaporates, clouds form, and rain falls again. 'Water is life,' he said. 'Never waste a single drop.'", "concepts": ["Water is found in oceans, rivers, lakes, ponds, glaciers, and underground.", "The water cycle: evaporation → condensation → precipitation → collection.", "We use water for drinking, cooking, bathing, farming, and industries.", "Water can be solid (ice), liquid (water), or gas (steam).", "We must conserve water by fixing leaks and not wasting it."], "svg": "<svg viewBox='0 0 300 200' xmlns='http://www.w3.org/2000/svg'>\n      <rect width='300' height='200' fill='#EFF6FF'/>\n      <rect x='0' y='150' width='300' height='50' fill='#93C5FD' rx='2'/>\n      <circle cx='80' cy='60' r='35' fill='#BFDBFE'/>\n      <circle cx='140' cy='50' r='28' fill='#93C5FD'/>\n      <circle cx='195' cy='55' r='32' fill='#BFDBFE'/>\n      <text x='140' y='55' text-anchor='middle' font-size='12' fill='#1D4ED8'>☁️ Cloud</text>\n      <circle cx='150' cy='100' r='28' fill='#FBBF24'/>\n      <text x='150' y='96' text-anchor='middle' font-size='11' fill='#92400E'>☀️ Sun</text>\n      <line x1='60' y1='90' x2='60' y2='155' stroke='#3B82F6' stroke-width='2' stroke-dasharray='4'/>\n      <line x1='130' y1='80' x2='110' y2='155' stroke='#3B82F6' stroke-width='2' stroke-dasharray='4'/>\n      <line x1='200' y1='85' x2='220' y2='155' stroke='#3B82F6' stroke-width='2' stroke-dasharray='4'/>\n      <text x='40' y='110' font-size='9' fill='#1D4ED8'>Rain</text>\n      <path d='M240,150 Q240,130 270,120' stroke='#60A5FA' stroke-width='2' fill='none' marker-end='url(#arr)'/>\n      <text x='242' y='118' font-size='9' fill='#1E40AF'>Evaporation</text>\n      <text x='150' y='195' text-anchor='middle' font-size='10' fill='#1D4ED8'>Water Cycle 💧</text>\n    </svg>", "flashcards": [{"q": "What is the water cycle?", "a": "The continuous movement of water — evaporation, cloud formation, rain, and collection."}, {"q": "Name three sources of water.", "a": "Rivers, lakes, and underground wells."}, {"q": "What are the three states of water?", "a": "Solid (ice), liquid (water), and gas (steam/vapour)."}, {"q": "Why should we save water?", "a": "Water is limited; without it no life can survive."}, {"q": "What is evaporation?", "a": "Water turning into vapour due to heat from the sun."}], "quiz": [{"q": "Which is the largest source of water on Earth?", "opts": ["Rivers", "Ponds", "Oceans", "Wells"], "ans": 2}, {"q": "What happens to water when it is heated?", "opts": ["It freezes", "It evaporates", "It solidifies", "It disappears"], "ans": 1}, {"q": "What is rain called in the water cycle?", "opts": ["Evaporation", "Condensation", "Precipitation", "Collection"], "ans": 2}, {"q": "Ice is water in which state?", "opts": ["Liquid", "Gas", "Solid", "Plasma"], "ans": 2}, {"q": "Which of these saves water?", "opts": ["Long showers", "Fixing leaking taps", "Leaving taps open", "Washing cars daily"], "ans": 1}], "reflect": ["Collect rainwater in a bowl. Observe how much evaporates in 24 hours.", "Think of three ways your family can save water at home."], "game": "water-cycle-sim"}, {"id": 6, "emoji": "🌬️", "title": "Air Around Us", "color": "#06B6D4", "story": "Ali blew soap bubbles in the park and watched them float away. His science teacher explained that the bubbles were filled with air — a mixture of gases we cannot see but absolutely need to breathe. Air gives us oxygen, carries seeds and clouds, and makes windmills spin. But smoke and dust pollute it, so we must keep it clean.", "concepts": ["Air is a mixture of gases: mainly nitrogen (78%) and oxygen (21%).", "We cannot see, smell (clean air), or taste air, but we can feel it.", "Air is needed for breathing, burning, and many natural processes.", "Wind is moving air; it helps in flying kites and generating electricity.", "Air pollution comes from vehicles, factories, and burning garbage."], "svg": "<svg viewBox='0 0 300 200' xmlns='http://www.w3.org/2000/svg'>\n      <rect width='300' height='200' fill='#ECFEFF'/>\n      <circle cx='150' cy='100' r='70' fill='none' stroke='#06B6D4' stroke-width='2' stroke-dasharray='6'/>\n      <text x='150' y='60' text-anchor='middle' font-size='13' fill='#0E7490'>AIR</text>\n      <text x='100' y='95' text-anchor='middle' font-size='11' fill='#155E75'>N₂ 78%</text>\n      <text x='200' y='95' text-anchor='middle' font-size='11' fill='#0891B2'>O₂ 21%</text>\n      <text x='150' y='130' text-anchor='middle' font-size='10' fill='#64748B'>Other gases 1%</text>\n      <path d='M30,80 Q60,65 90,80 Q120,95 150,80' stroke='#06B6D4' stroke-width='3' fill='none'/>\n      <path d='M30,100 Q60,85 90,100 Q120,115 150,100' stroke='#06B6D4' stroke-width='3' fill='none'/>\n      <text x='30' y='125' font-size='10' fill='#0E7490'>🌬️ Wind</text>\n      <text x='200' y='155' font-size='10' fill='#DC2626'>🏭 Pollution</text>\n      <rect x='210' y='130' width='20' height='30' fill='#94A3B8'/>\n      <ellipse cx='220' cy='128' rx='10' ry='6' fill='#6B7280'/>\n      <path d='M220,122 Q225,100 215,90' stroke='#94A3B8' stroke-width='4' fill='none'/>\n      <text x='150' y='198' text-anchor='middle' font-size='10' fill='#0E7490'>Air Around Us 🌬️</text>\n    </svg>", "flashcards": [{"q": "What is air made of?", "a": "Mainly nitrogen (78%) and oxygen (21%), plus other gases."}, {"q": "Which gas in air do we breathe?", "a": "Oxygen."}, {"q": "What is wind?", "a": "Moving air is called wind."}, {"q": "Name two causes of air pollution.", "a": "Vehicle exhaust fumes and factory smoke."}, {"q": "How can we reduce air pollution?", "a": "Plant more trees, use public transport, and avoid burning garbage."}], "quiz": [{"q": "Which gas is most abundant in air?", "opts": ["Oxygen", "Carbon dioxide", "Nitrogen", "Hydrogen"], "ans": 2}, {"q": "Which gas do we breathe to stay alive?", "opts": ["Nitrogen", "Oxygen", "Carbon dioxide", "Steam"], "ans": 1}, {"q": "Moving air is called:", "opts": ["Rain", "Cloud", "Wind", "Storm"], "ans": 2}, {"q": "What causes air pollution?", "opts": ["Planting trees", "Factory smoke", "Rain", "Clean energy"], "ans": 1}, {"q": "Which helps clean the air naturally?", "opts": ["Factories", "Cars", "Trees", "Garbage burning"], "ans": 2}], "reflect": ["Go outside and observe signs of wind around you. List five things wind moves.", "What can your family do to reduce air pollution in your area?"], "game": "air-clean"}, {"id": 7, "emoji": "🍎", "title": "Our Food", "color": "#EC4899", "story": "Grandma Fatima spread a colourful meal on the mat: rice, lentil soup, spinach curry, yogurt, and apples. She told the children that different foods give our bodies different things — energy to run and play, nutrients to grow strong, vitamins to stay healthy. 'Eat a rainbow every day,' she smiled.", "concepts": ["We need food for energy, growth, and protection from disease.", "Food groups: cereals/grains, fruits, vegetables, dairy, proteins, and fats.", "A balanced diet includes all food groups in correct amounts.", "Junk food (chips, cola) gives little nutrition and harms health.", "We should wash hands and food before eating to stay safe."], "svg": "<svg viewBox='0 0 300 200' xmlns='http://www.w3.org/2000/svg'>\n      <rect width='300' height='200' fill='#FFF0F6'/>\n      <circle cx='150' cy='100' r='80' fill='#FEE2E2' stroke='#EC4899' stroke-width='2'/>\n      <path d='M150,100 L150,20 A80,80 0 0,1 219,140 Z' fill='#FCA5A5'/>\n      <path d='M150,100 L219,140 A80,80 0 0,1 81,140 Z' fill='#FDE68A'/>\n      <path d='M150,100 L81,140 A80,80 0 0,1 150,20 Z' fill='#86EFAC'/>\n      <text x='180' y='70' font-size='10' fill='#DC2626'>🌾 Grains</text>\n      <text x='175' y='155' font-size='10' fill='#92400E'>🥛 Dairy</text>\n      <text x='80' y='100' font-size='10' fill='#16A34A'>🥦 Veggies</text>\n      <circle cx='150' cy='100' r='20' fill='#EC4899'/>\n      <text x='150' y='104' text-anchor='middle' font-size='10' fill='#FFF'>Plate</text>\n      <text x='150' y='196' text-anchor='middle' font-size='10' fill='#9D174D'>Balanced Food Plate 🍽️</text>\n    </svg>", "flashcards": [{"q": "Why do we need food?", "a": "For energy, growth, and to fight diseases."}, {"q": "Name three food groups.", "a": "Grains, fruits & vegetables, and dairy."}, {"q": "What is a balanced diet?", "a": "A diet that includes all food groups in the right amounts."}, {"q": "Why is junk food harmful?", "a": "It has little nutrition, excess sugar/fat, and causes health problems."}, {"q": "Why should we wash vegetables before cooking?", "a": "To remove germs, dirt, and harmful chemicals."}], "quiz": [{"q": "Which food gives us the most energy?", "opts": ["Chips", "Rice and bread", "Cola", "Candy"], "ans": 1}, {"q": "Which vitamin do we get from sunlight?", "opts": ["Vitamin A", "Vitamin B", "Vitamin C", "Vitamin D"], "ans": 3}, {"q": "Which is a healthy food choice?", "opts": ["Burger and cola", "Apple and milk", "Chips and soda", "Candy bar"], "ans": 1}, {"q": "What does protein help build?", "opts": ["Bones only", "Muscles and tissues", "Only teeth", "Only skin"], "ans": 1}, {"q": "Which is a dairy product?", "opts": ["Apple", "Bread", "Cheese", "Potato"], "ans": 2}], "reflect": ["Draw your favourite healthy meal and label each food group on your plate.", "For one day, write down everything you eat. Is it // ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let progress = JSON.parse(localStorage.getItem('evs_progress') || '{}');
let bookmarks = JSON.parse(localStorage.getItem('evs_bookmarks') || '[]');
let currentChapter = 0;
let currentFC = 0;
let quizAnswered = [];
let quizDone = false;

function saveProgress(){ localStorage.setItem('evs_progress', JSON.stringify(progress)); }
function saveBookmarks(){ localStorage.setItem('evs_bookmarks', JSON.stringify(bookmarks)); }

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  const bnav = document.getElementById('bnav');
  if(['title','chapter'].includes(id)){ bnav.style.display = id==='title'?'none':'flex'; }
  else{ bnav.style.display='flex'; }
  if(id==='home') renderHome();
  if(id==='progress') renderProgress();
  if(id==='bookmarks') renderBookmarks();
}

// ═══════════════════════════════════════════
//  HOME
// ═══════════════════════════════════════════
function renderHome(){
  const grid = document.getElementById('chapter-grid');
  let totalStars = 0, maxStars = CHAPTERS.length * 5;
  CHAPTERS.forEach(ch => { totalStars += (progress[ch.id] || 0); });
  document.getElementById('total-stars').textContent = totalStars;
  document.getElementById('prog-fill').style.width = (totalStars/maxStars*100).toFixed(0)+'%';
  grid.innerHTML = CHAPTERS.map(ch => {
    const s = progress[ch.id] || 0;
    const stars = '⭐'.repeat(s) + '☆'.repeat(Math.max(0,5-s));
    return `<div class="ch-card" style="--ch-color:${ch.color}" onclick="openChapter(${ch.id})">
      <span class="ch-emoji">${ch.emoji}</span>
      <div class="ch-title">${ch.title}</div>
      <div class="ch-stars">${stars}</div>
      ${s>=5?'<span class="ch-done">✅</span>':''}
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
//  CHAPTER
// ═══════════════════════════════════════════
function openChapter(id){
  currentChapter = id;
  const ch = CHAPTERS[id];
  document.getElementById('ch-title-h').textContent = ch.emoji + ' ' + ch.title;
  document.getElementById('ch-subtitle').textContent = 'Chapter ' + (id+1) + ' of ' + CHAPTERS.length;
  document.getElementById('bm-toggle').textContent = bookmarks.includes(id) ? '🔖' : '🏷️';
  // story
  document.getElementById('tab-story').innerHTML = `<div class="story-box">${ch.story}</div>`;
  // learn
  document.getElementById('tab-learn').innerHTML = `<ul class="concept-list">${
    ch.concepts.map((c,i) => `<li data-n="${i+1}">${c}</li>`).join('')
  }</ul>`;
  // visual
  document.getElementById('tab-visual').innerHTML = `<div class="visual-wrap">${ch.svg}</div>
    <p style="color:var(--text2);font-size:.8rem;margin-top:10px;text-align:center">Study the diagram above carefully 👆</p>`;
  // flashcards
  currentFC = 0;
  renderFC(ch);
  // quiz
  quizAnswered = []; quizDone = false;
  renderQuiz(ch);
  // think/reflect
  document.getElementById('tab-think').innerHTML = ch.reflect.map((r,i) =>
    `<div class="reflect-box"><h4>🤔 Reflection ${i+1}</h4><p>${r}</p></div>`
  ).join('');
  // activity game
  document.getElementById('tab-activity').innerHTML = `<div class="game-wrap" id="game-area"></div>`;
  // switch to story tab
  switchTab('story');
  showScreen('chapter');
  setTimeout(() => loadGame(ch), 100);
}

function switchTab(name){
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  const tabs = document.querySelectorAll('.tab');
  const names = ['story','learn','visual','activity','cards','quiz','think'];
  const idx = names.indexOf(name);
  if(tabs[idx]) tabs[idx].classList.add('active');
}

// ═══════════════════════════════════════════
//  FLASHCARDS
// ═══════════════════════════════════════════
function renderFC(ch){
  const container = document.getElementById('tab-cards');
  function render(){
    const fc = ch.flashcards[currentFC];
    container.innerHTML = `
      <div class="fc" id="fc-card" onclick="flipFC()">
        <div class="fc-badge">Tap to flip!</div>
        <div class="fc-q">❓ ${fc.q}</div>
        <div class="fc-a">💡 ${fc.a}</div>
      </div>
      <div class="fc-nav">
        <button onclick="changeFC(-1,${ch.id})">← Prev</button>
        <span class="fc-counter">${currentFC+1} / ${ch.flashcards.length}</span>
        <button onclick="changeFC(1,${ch.id})">Next →</button>
      </div>
      <p style="color:var(--text2);font-size:.78rem;text-align:center;margin-top:8px">Tap the card to reveal the answer!</p>
    `;
  }
  render();
  window._renderFC = render;
}

function flipFC(){
  document.getElementById('fc-card').classList.toggle('flipped');
}

function changeFC(dir, chId){
  const ch = CHAPTERS[chId];
  currentFC = (currentFC + dir + ch.flashcards.length) % ch.flashcards.length;
  window._renderFC && window._renderFC();
}

// ═══════════════════════════════════════════
//  QUIZ
// ═══════════════════════════════════════════
function renderQuiz(ch){
  if(quizDone){ showQuizResult(ch); return; }
  const qIdx = quizAnswered.length;
  if(qIdx >= ch.quiz.length){ quizDone=true; showQuizResult(ch); return; }
  const q = ch.quiz[qIdx];
  document.getElementById('tab-quiz').innerHTML = `
    <div style="color:var(--accent);font-size:.85rem;margin-bottom:10px">Question ${qIdx+1} of ${ch.quiz.length}</div>
    <div class="quiz-q">${q.q}</div>
    <div class="quiz-opts">
      ${q.opts.map((o,i) => `<button class="quiz-opt" onclick="answerQuiz(${i},${qIdx},${ch.id})">${'ABCD'[i]}. ${o}</button>`).join('')}
    </div>
  `;
}

function answerQuiz(chosen, qIdx, chId){
  const ch = CHAPTERS[chId];
  const q = ch.quiz[qIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((o,i) => {
    o.disabled = true;
    if(i === q.ans) o.classList.add('correct');
    else if(i === chosen) o.classList.add('wrong');
  });
  quizAnswered.push(chosen === q.ans);
  setTimeout(() => renderQuiz(ch), 900);
}

function showQuizResult(ch){
  const correct = quizAnswered.filter(Boolean).length;
  const stars = Math.round(correct / ch.quiz.length * 5);
  progress[ch.id] = Math.max(progress[ch.id]||0, stars);
  saveProgress();
  document.getElementById('tab-quiz').innerHTML = `
    <div class="quiz-result">
      <div style="font-size:3rem">${correct >= 4 ? '🏆' : correct >= 2 ? '👍' : '💪'}</div>
      <div class="score">${correct}/${ch.quiz.length}</div>
      <p>You earned <strong style="color:#FFE66D">${stars} ⭐</strong> stars!</p>
      <button class="btn-primary" onclick="retryQuiz(${ch.id})">🔄 Try Again</button>
    </div>
  `;
  if(stars >= 3) celebrate('🎉 Amazing Work!', stars);
}

function retryQuiz(chId){
  quizAnswered = []; quizDone = false;
  renderQuiz(CHAPTERS[chId]);
}

// ═══════════════════════════════════════════
//  PROGRESS
// ═══════════════════════════════════════════
function renderProgress(){
  let total = 0;
  CHAPTERS.forEach(ch => total += (progress[ch.id]||0));
  const BADGES = [
    {icon:'🌱',name:'First Step',req:1,msg:'Earned 1st star'},
    {icon:'⭐',name:'Star Collector',req:10,msg:'10+ stars earned'},
    {icon:'🏆',name:'Champion',req:25,msg:'25+ stars earned'},
    {icon:'📚',name:'Scholar',req:40,msg:'40+ stars earned'},
    {icon:'🌟',name:'Super Star',req:55,msg:'55+ stars earned'},
    {icon:'🎓',name:'EVS Expert',req:60,msg:'All 60 stars!'},
  ];
  document.getElementById('badges-grid').innerHTML = BADGES.map(b =>
    `<div class="badge ${total >= b.req ? 'earned' : ''}">
      <span class="badge-icon">${b.icon}</span>
      <div class="badge-name">${b.name}</div>
    </div>`
  ).join('');
  document.getElementById('ch-prog-list').innerHTML = CHAPTERS.map(ch => {
    const s = progress[ch.id]||0;
    return `<div class="ch-prog-item">
      <span class="ch-prog-emoji">${ch.emoji}</span>
      <div class="ch-prog-info">
        <div class="ch-prog-title">${ch.title}</div>
        <div class="ch-prog-stars">${'⭐'.repeat(s)+'☆'.repeat(5-s)}</div>
      </div>
      <span style="color:var(--accent);font-weight:800">${s}/5</span>
    </div>`;
  }).join('');
}

function resetProgress(){
  if(confirm('Reset all progress and stars? This cannot be undone.')){
    progress={};bookmarks=[];saveProgress();saveBookmarks();renderProgress();
  }
}

// ═══════════════════════════════════════════
//  BOOKMARKS
// ═══════════════════════════════════════════
function toggleBookmark(){
  const id = currentChapter;
  if(bookmarks.includes(id)) bookmarks = bookmarks.filter(b => b!==id);
  else bookmarks.push(id);
  saveBookmarks();
  document.getElementById('bm-toggle').textContent = bookmarks.includes(id) ? '🔖' : '🏷️';
}

function renderBookmarks(){
  const el = document.getElementById('bm-list');
  if(!bookmarks.length){ el.innerHTML='<div class="empty-state">📭 No bookmarks yet!<br>Tap 🏷️ in any chapter to save it here.</div>'; return; }
  el.innerHTML = bookmarks.map(id => {
    const ch = CHAPTERS[id];
    return `<div class="bm-item" onclick="openChapter(${id})">
      <span class="bm-emoji">${ch.emoji}</span>
      <div class="bm-info"><h4>${ch.title}</h4><p>Chapter ${id+1}</p></div>
      <button class="bm-remove" onclick="event.stopPropagation();removeBookmark(${id})">✕</button>
    </div>`;
  }).join('');
}

function removeBookmark(id){
  bookmarks = bookmarks.filter(b => b!==id);
  saveBookmarks(); renderBookmarks();
}

// ═══════════════════════════════════════════
//  CELEBRATE
// ═══════════════════════════════════════════
function celebrate(msg, stars){
  document.getElementById('cel-msg').textContent = msg;
  document.getElementById('cel-stars').textContent = '⭐'.repeat(stars);
  document.getElementById('celebrate').classList.add('show');
  for(let i=0;i<40;i++) spawnConfetti();
}

function closeCelebrate(){
  document.getElementById('celebrate').classList.remove('show');
}

function spawnConfetti(){
  const c = document.createElement('div');
  c.className = 'confetti-piece';
  c.style.cssText = `
    left:${Math.random()*100}vw;top:-10px;
    background:hsl(${Math.random()*360},80%,60%);
    transform:rotate(${Math.random()*360}deg);
    animation-duration:${1.5+Math.random()*2}s;
    animation-delay:${Math.random()*0.5}s;
    width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;

  if(g==='family-match') area.innerHTML = gameFamilyMatch();

  else if(g==='vehicle-match') area.innerHTML = gameVehicleMatch();

// GAME 4 — Plant Growth Canvas
function gamePlantGrowth(){
  return `<div style="padding:16px;text-align:center">
    <h3 style="color:var(--accent);margin-bottom:8px">🌱 Grow Your Plant!</h3>
    <p style="color:var(--text2);font-size:.82rem;margin-bottom:10px">Click the buttons to help the plant grow</p>
    <canvas id="plant-canvas" width="280" height="220" style="border-radius:12px;background:#1a3a1a;display:block;margin:0 auto"></canvas>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap">
      <button onclick="addWater()" style="background:#3B82F6;color:#fff;border:none;border-radius:20px;padding:9px 18px;cursor:pointer;font-weight:700">💧 Water</button>
      <button onclick="addSun()" style="background:#EAB308;color:#1a1a2e;border:none;border-radius:20px;padding:9px 18px;cursor:pointer;font-weight:700">☀️ Sun</button>
      <button onclick="resetPlant()" style="background:#6B7280;color:#fff;border:none;border-radius:20px;padding:9px 18px;cursor:pointer;font-weight:700">🔄 Reset</button>
    </div>
    <div id="plant-msg" style="color:#4ADE80;margin-top:10px;font-weight:700;font-size:.9rem">Add water and sunlight to grow your plant! 🌱</div>
    <script>
    var plantH=5,watered=0,sunned=0;
    var pc=document.getElementById('plant-canvas');var pctx=pc.getContext('2d');
    function drawPlant(){
      pctx.clearRect(0,0,280,220);
      // soil
      pctx.fillStyle='#8B5E3C';pctx.fillRect(0,190,280,30);
      // stem
      if(plantH>5){
        pctx.strokeStyle='#16A34A';pctx.lineWidth=6;pctx.lineCap='round';
        pctx.beginPath();pctx.moveTo(140,190);pctx.lineTo(140,190-plantH*1.8);pctx.stroke();
      }
      // leaves
      if(plantH>15){
        pctx.fillStyle='#22C55E';
        pctx.beginPath();pctx.ellipse(110,150,30,15,-.4,0,Math.PI*2);pctx.fill();
        pctx.beginPath();pctx.ellipse(170,130,30,15,.4,0,Math.PI*2);pctx.fill();
      }
      // flower
      if(plantH>=50){
        ['#FF6B35','#FFE66D','#EC4899','#4ECDC4','#A855F7'].forEach((c,i)=>{
          pctx.fillStyle=c;
          var a=i/5*Math.PI*2;
          pctx.beginPath();pctx.arc(140+Math.cos(a)*16,190-plantH*1.8+Math.sin(a)*16,10,0,Math.PI*2);pctx.fill();
        });
        pctx.fillStyle='#FFE66D';pctx.beginPath();pctx.arc(140,190-plantH*1.8,10,0,Math.PI*2);pctx.fill();
      }
      // seed at start
      if(plantH<=5){
        pctx.fillStyle='#92400E';pctx.beginPath();pctx.ellipse(140,195,8,5,0,0,Math.PI*2);pctx.fill();
      }
    }
    function addWater(){watered++;if(watered+sunned>1&&plantH<50){plantH=Math.min(50,plantH+5);}drawPlant();updateMsg();}
    function addSun(){sunned++;if(watered+sunned>1&&plantH<50){plantH=Math.min(50,plantH+5);}drawPlant();updateMsg();}
    function resetPlant(){plantH=5;watered=0;sunned=0;drawPlant();document.getElementById('plant-msg').textContent='Add water and sunlight to grow your plant! 🌱';}
    function updateMsg(){
      var msgs=['Add water and sunlight to grow your plant! 🌱','Great! The seed is sprouting! 🌱','Growing nicely! Keep going! 🌿','Leaves are forming! 🍃','Almost there! 🌳','🌸 Your plant is fully grown with a flower!'];
      var idx=Math.min(5,Math.floor(plantH/10));
      document.getElementById('plant-msg').textContent=msgs[idx];
    }
    drawPlant();
    <\/script>
  </div>`;
}

function gameAirClean(){
  const items=[
    {t:'🚗 Diesel car',clean:false},{t:'🌳 Plant trees',clean:true},
    {t:'🏭 Factory smoke',clean:false},{t:'🚲 Ride bicycle',clean:true},
    {t:'🔥 Burn garbage',clean:false},{t:'☀️ Solar energy',clean:true},

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px" id="ac-grid">
      ${shuffled.map((it,i)=>`<button id="ac-${i}" onclick="acToggle(${i},${it.clean})" style="background:#ffffff11;border:1.5px solid #ffffff22;border-radius:10px;padding:10px;color:#fff;cursor:pointer;font-size:.85rem;transition:.2s">${it.t}</button>`).join('')}
    </div>
    <div style="display:flex;gap:10px;margin-top:12px">
      <div style="flex:1;background:#22C55E22;border:1px solid #22C55E;border-radius:10px;padding:10px;text-align:center;font-size:.8rem;color:#4ADE80">✅ Clean Air<br><span id="clean-count">0</span></div>
      <div style="flex:1;background:#EF444422;border:1px solid #EF4444;border-radius:10px;padding:10px;text-align:center;font-size:.8rem;color:#FCA5A5">⚠️ Polluting<br><span id="poll-count">0</span></div>
    </div>
    <div id="ac-result" style="text-align:center;margin-top:10px;font-weight:700"></div>
    <script>
    var acState=${JSON.stringify(shuffled.map((_,i)=>null))};
    var acData=${JSON.stringify(shuffled)};
    function acToggle(i,isClean){
      acState[i]=acState[i]===null?isClean:null;
      var btn=document.getElementById('ac-'+i);
      if(acState[i]===true){btn.style.background='#22C55E33';btn.style.borderColor='#22C55E';}
      else if(acState[i]===false){btn.style.background='#EF444433';btn.style.borderColor='#EF4444';}
      else{btn.style.background='#ffffff11';btn.style.borderColor='#ffffff22';}
      var cc=acState.filter(s=>s===true).length;
      var pc=acState.filter(s=>s===false).length;
      document.getElementById('clean-count').textContent=cc;
      document.getElementById('poll-count').textContent=pc;
      var correct=acData.every((it,i)=>acState[i]===null||(it.clean===acState[i]));
      if(acState.every(s=>s!==null)){
        var right=acData.filter((it,i)=>it.clean===acState[i]).length;
        document.getElementById('ac-result').innerHTML=right===acData.length?'🌟 Perfect! You sorted all correctly!':'👍 '+right+'/'+acData.length+' correct! Check the red ones.';
      }
    }
    <\/script>
  </div>`;
}

// GAME 9 — Vehicle Match
function gameVehicleMatch(){
  const vehicles=[
    {v:'🚗 Car',t:'Land'},{v:'✈️ Aeroplane',t:'Air'},
    {v:'🚢 Ship',t:'Water'},{v:'🚂 Train',t:'Land'},
    {v:'🚁 Helicopter',t:'Air'},{v:'⛵ Sailboat',t:'Water'},
  ];
  const shuffled=[...vehicles].sort(()=>Math.random()-.5);
  const types=['Land','Water','Air'];
  return `<div style="padding:16px">
    <h3 style="color:var(--accent);margin-bottom:10px">🚗 Sort Vehicles by Type!</h3>
    ${shuffled.map((veh,i)=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:9px">
      <span style="flex:0 0 120px;background:#ffffff11;border-radius:8px;padding:8px;font-size:.85rem">${veh.v}</span>
      <select id="vm-${i}" style="flex:1;padding:8px;border-radius:8px;background:#1a1a3e;color:#fff;border:1px solid #ffffff33">
        <option value="">Select...</option>
        ${types.map(t=>`<option>${t}</option>`).join('')}
      </select>
    </div>`).join('')}
    <button onclick="checkVM(${JSON.stringify(shuffled)})" style="width:100%;background:linear-gradient(135deg,#EAB308,#FF6B35);color:#1a1a2e;border:none;border-radius:20px;padding:11px;font-weight:800;cursor:pointer;margin-top:6px">Check! ✓</button>
    <div id="vm-result" style="text-align:center;margin-top:10px;font-weight:700"></div>
    <script>
    window.checkVM=function(vehicles){
      var s=0;vehicles.forEach(function(v,i){var el=document.getElementById('vm-'+i);if(el&&el.value===v.t){s++;el.style.borderColor='#22C55E';}else if(el){el.style.borderColor='#EF4444';}});
      document.getElementById('vm-result').innerHTML=s===vehicles.length?'🚀 Perfect score!':'✈️ '+s+'/'+vehicles.length+' correct!';
    };
    <\/script>
  </div>`;
}

// GAME 10 — Communication Timeline
function gameCommTimeline(){
  const items=[
    {item:'📜 Written letters',era:'Ancient'},
    {item:'🐦 Pigeon post',era:'Ancient'},
    {item:'📰 Newspaper',era:'Modern (print)'},
    {item:'📻 Radio',era:'Modern (electronic)'},
    {item:'📺 Television',era:'Modern (electronic)'},
    {item:'📱 Mobile phone',era:'Digital age'},
    {item:'🌐 Internet',era:'Digital age'},
  ];
  return `<div style="padding:16px">
    <h3 style="color:var(--accent);margin-bottom:10px">📡 Communication Timeline</h3>
    <p style="color:var(--text2);font-size:.82rem;margin-bottom:12px">Tap each item to reveal when it was used!</p>
    ${items.map((it,i)=>`<div id="ct-${i}" onclick="ctReveal(${i},'${it.era}')" style="background:#ffffff11;border:1px solid #8B5CF655;border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:.9rem">${it.item}</span>
      <span id="ct-era-${i}" style="color:#8B5CF6;font-size:.78rem;opacity:0">🕐 ${it.era}</span>
    </div>`).join('')}
    <script>
    function ctReveal(i,era){
      document.getElementById('ct-era-'+i).style.opacity=1;
      document.getElementById('ct-'+i).style.borderColor='#A855F7';
      document.getElementById('ct-'+i).style.background='#A855F722';
    }
    <\/script>
  </div>`;
}

// GAME 11 — Safety Quiz
function gameSafetyQuiz(){
  const qs=[
    {q:'Traffic light is RED. What do you do?',opts:['Run across','Stop and wait','Wave at cars','Jump'],ans:1},
    {q:'You smell gas at home. What do you do?',opts:['Light a match','Open windows & call adult','Ignore it','Sleep'],ans:1},
    {q:'A stranger offers you sweets and asks you to come with them. You:',opts:['Go with them','Take sweets and go','Say NO and run to a trusted adult','Argue'],ans:2},
    {q:'You get a small cut. First you should:',opts:['Ignore it','Put mud on it','Clean with clean water','Eat sugar'],ans:2},
    {q:'Which number do you call for police?',opts:['100','101','102','999'],ans:0},
  ];
  let idx=0,score=0;
  return `<div style="padding:16px;text-align:center">
    <h3 style="color:var(--accent);margin-bottom:10px">🦺 Safety Challenge!</h3>
    <div id="sq2-area"></div>
    <script>
    var sq2Qs=${JSON.stringify(qs)};var sq2Idx=0,sq2Score=0;
    function renderSQ2(){
      if(sq2Idx>=sq2Qs.length){
        document.getElementById('sq2-area').innerHTML=\`<div style="padding:20px"><div style="font-size:3rem">\${sq2Score>=4?'🏆':'💪'}</div><div style="font-size:1.5rem;color:#FFE66D;font-weight:800">\${sq2Score}/\${sq2Qs.length} Safety Stars!</div><button onclick="sq2Idx=0;sq2Score=0;renderSQ2()" style="background:#EF4444;color:#fff;border:none;border-radius:20px;padding:10px 24px;margin-top:12px;cursor:pointer;font-weight:700">Try Again</button></div>\`;
        return;
      }
      const q=sq2Qs[sq2Idx];
      document.getElementById('sq2-area').innerHTML=\`<div style="background:#ffffff11;border-radius:12px;padding:14px;text-align:left">
        <div style="color:#EF4444;font-size:.8rem;margin-bottom:6px">Safety Q\${sq2Idx+1}</div>
        <div style="font-weight:700;margin-bottom:12px">\${q.q}</div>
        <div style="display:flex;flex-direction:column;gap:8px">\${q.opts.map((o,i)=>\`<button onclick="sq2Ans(\${i},\${q.ans})" style="background:#ffffff11;border:1.5px solid #ffffff22;border-radius:8px;padding:11px;color:#fff;cursor:pointer;text-align:left">\${o}</button>\`).join('')}</div>
      </div>\`;
    }
    function sq2Ans(chosen,ans){if(chosen===ans)sq2Score++;sq2Idx++;renderSQ2();}
    renderSQ2();
    <\/script>
  </div>`;
}

// GAME 12 — Clean Environment
function gameCleanEnv(){
  const items=[
    {t:'🌳 Plant a tree',good:true},{t:'🗑️ Throw litter',good:false},
    {t:'♻️ Recycle paper',good:true},{t:'🚗 Drive everywhere',good:false},
    {t:'💧 Save water',good:true},{t:'🔥 Burn rubbish',good:false},
    {t:'🚲 Ride a bicycle',good:true},{t:'🏭 Open more factories',good:false},
  ];
  const shuffled=[...items].sort(()=>Math.random()-.5);
  return `<div style="padding:16px">
    <h3 style="color:var(--accent);margin-bottom:8px">🌍 Help or Harm the Environment?</h3>
    <p style="color:var(--text2);font-size:.82rem;margin-bottom:12px">Tap each action to classify it</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${shuffled.map((it,i)=>`<button id="ce-${i}" onclick="ceToggle(${i},${it.good})" style="background:#ffffff11;border:1.5px solid #ffffff22;border-radius:10px;padding:10px;color:#fff;cursor:pointer;font-size:.83rem">${it.t}</button>`).join('')}
    </div>
    <div id="ce-result" style="text-align:center;margin-top:14px;font-weight:700"></div>
    <script>
    var ceData=${JSON.stringify(shuffled)},ceState=new Array(${shuffled.length}).fill(null);
    function ceToggle(i,isG){
      ceState[i]=ceState[i]===null?isG:null;
      var btn=document.getElementById('ce-'+i);
      btn.style.background=ceState[i]===true?'#22C55E33':ceState[i]===false?'#EF444433':'#ffffff11';
      btn.style.borderColor=ceState[i]===true?'#22C55E':ceState[i]===false?'#EF4444':'#ffffff22';
      if(ceState.every(s=>s!==null)){
        var score=ceData.filter(function(it,i){return it.good===ceState[i];}).length;
        document.getElementById('ce-result').innerHTML=score===ceData.length?'🌟 Excellent! You are an Earth Guardian!':'🌍 '+score+'/'+ceData.length+' correct!';
      }
    }
    <\/script>
  </div>`;
}
